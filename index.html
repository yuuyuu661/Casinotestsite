<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>oasisカジノサイト</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:0;
  font-family:
    "Hiragino Sans",
    "Yu Gothic UI",
    sans-serif;

  background:
    radial-gradient(circle at top,#111827 0%,#020617 45%,#000 100%);

  color:#f8fafc;
}

/* =========================
   全体
========================= */

.container{
  width:100%;
  max-width:1200px;
  margin:auto;
  padding:24px;
}

/* =========================
   タイトル
========================= */

.title-box{
  text-align:center;
  margin-bottom:28px;
}

.main-title{
  font-size:clamp(2rem,5vw,3.5rem);
  font-weight:900;
  letter-spacing:0.08em;

  background:linear-gradient(
    90deg,
    #facc15,
    #fde68a,
    #facc15
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  margin-bottom:12px;
}

.balance{
  font-size:1.2rem;
  font-weight:700;
  color:#facc15;
}

.description{
  margin-top:18px;
  color:#cbd5e1;
  line-height:1.8;
  font-size:1rem;
}

/* =========================
   カテゴリー
========================= */

.category{
  margin-top:24px;

  background:rgba(15,23,42,0.75);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:18px;

  overflow:hidden;

  backdrop-filter:blur(8px);
}

/* =========================
   開閉ボタン
========================= */

.category-header{
  width:100%;
  padding:20px;

  background:transparent;
  border:none;

  color:#fff;
  font-size:1.2rem;
  font-weight:800;

  cursor:pointer;

  display:flex;
  justify-content:space-between;
  align-items:center;

  transition:0.2s;
}

.category-header:hover{
  background:rgba(255,255,255,0.04);
}

.arrow{
  transition:0.25s;
  font-size:1.2rem;
}

.category.open .arrow{
  transform:rotate(180deg);
}

/* =========================
   中身
========================= */

.category-content{
  max-height:0;
  overflow:hidden;

  transition:max-height 0.35s ease;
}

.category.open .category-content{
  max-height:1000px;
}

/* =========================
   ゲーム一覧
========================= */

.game-grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

  gap:16px;

  padding:0 20px 20px;
}

.game-card{

  background:
    linear-gradient(
      145deg,
      rgba(30,41,59,0.95),
      rgba(15,23,42,0.95)
    );

  border:
    1px solid rgba(255,255,255,0.06);

  border-radius:16px;

  padding:22px;

  cursor:pointer;

  transition:0.2s;
}

.game-card:hover{
  transform:translateY(-4px);
  border-color:#facc15;
  box-shadow:0 0 18px rgba(250,204,21,0.25);
}

.game-title{
  font-size:1.15rem;
  font-weight:800;
  margin-bottom:10px;
}

.game-desc{
  color:#cbd5e1;
  line-height:1.7;
  font-size:0.95rem;
}

/* =========================
   ランキング
========================= */

.ranking-box{
  margin-top:30px;

  background:rgba(15,23,42,0.78);

  border-radius:18px;

  border:1px solid rgba(255,255,255,0.08);

  padding:24px;
}

.ranking-title{
  font-size:1.4rem;
  font-weight:900;

  margin-bottom:20px;

  color:#facc15;
}

.ranking-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.rank-row{

  display:flex;
  justify-content:space-between;
  align-items:center;

  background:rgba(255,255,255,0.04);

  border-radius:12px;

  padding:14px 18px;

  transition:0.2s;
}

.rank-row:hover{
  background:rgba(255,255,255,0.08);
}

.rank-left{
  display:flex;
  gap:12px;
  align-items:center;
}

.rank-no{
  width:34px;
  height:34px;

  border-radius:50%;

  background:#facc15;

  color:#000;

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:900;
}

.rank-name{
  font-weight:700;
}

.rank-balance{
  color:#facc15;
  font-weight:800;
}

/* =========================
   スマホ
========================= */

@media(max-width:700px){

  .container{
    padding:16px;
  }

  .game-grid{
    grid-template-columns:1fr;
  }

}

</style>
</head>
<body>

<div class="container">

  <!-- タイトル -->
  <div class="title-box">

    <div class="main-title">
      🎰 oasisカジノサイト
    </div>

    <div
      class="balance"
      id="balance"
    >
      残高取得中...
</div>

    <div class="description">
      oasisカジノへようこそ。<br>
      様々なゲームで遊び、勝利してrrcを増やそう！
    </div>

  </div>

  <!-- 対戦系 -->
  <div class="category">

    <button class="category-header">
      🎮 対戦系カテゴリー
      <span class="arrow">▼</span>
    </button>

    <div class="category-content">

      <div class="game-grid">

        <div
          class="game-card"
          onclick="
            location.href=
            '/lobby?game=poker&session=${session}'
          "
        >
          <div class="game-title">🃏 ポーカー</div>
          <div class="game-desc">
            駆け引きと心理戦。<br>
            最強の手札で勝利を掴め。
          </div>
        </div>

        <div
          class="game-card"
          onclick="
            location.href=
            '/lobby?game=othello&session=${session}'
          "
        >
          <div class="game-title">⚫ オセロ</div>
          <div class="game-desc">
            シンプルながら奥深い頭脳戦。
          </div>
        </div>

        <div
          class="game-card"
          onclick="
            location.href=
            '/lobby?game=chinchiro&session=${session}'
          "
        >
          <div class="game-title">🎲 チンチロ</div>
          <div class="game-desc">
            運と度胸のダイス勝負。
          </div>
        </div>

                <div
          class="game-card"
          onclick="
            location.href=
            '/lobby?game=daifugo&session=${session}'
          "
        >
          <div class="game-title">👑 大富豪</div>
          <div class="game-desc">
            手札を制し、頂点を目指せ。
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- ソロ -->
  <div class="category">

    <button class="category-header">
      🎰 ソロプレイカテゴリー
      <span class="arrow">▼</span>
    </button>

    <div class="category-content">

      <div class="game-grid">

                <div
          class="game-card"
          onclick="
            location.href=
            '/lobby?game=blackjack&session=${session}'
          "
        >
          <div class="game-title">🂡 ブラックジャック</div>
          <div class="game-desc">
            21を目指す王道カードゲーム。
          </div>
        </div>

                <div
          class="game-card"
          onclick="
            location.href=
            '/lobby?game=slot&session=${session}'
          "
        >
          <div class="game-title">🎰 スロット</div>
          <div class="game-desc">
            リールを回して大当たりを狙え。
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- ランキング -->
  <div class="ranking-box">

    <div class="ranking-title">
      🏆 所持rrcランキング TOP50
    </div>

    <div class="ranking-list">

      <div class="rank-row">
        <div class="rank-left">
          <div class="rank-no">1</div>
          <div class="rank-name">ゅゅ</div>
        </div>

        <div class="rank-balance">
          999,999 rrc
        </div>
      </div>

      <div class="rank-row">
        <div class="rank-left">
          <div class="rank-no">2</div>
          <div class="rank-name">ゲロ</div>
        </div>

        <div class="rank-balance">
          850,000 rrc
        </div>
      </div>

      <div class="rank-row">
        <div class="rank-left">
          <div class="rank-no">3</div>
          <div class="rank-name">しょあ</div>
        </div>

        <div class="rank-balance">
          720,000 rrc
        </div>
      </div>

    </div>

  </div>

</div>

<script>

const categories = document.querySelectorAll(".category");

categories.forEach(category => {

  const header = category.querySelector(".category-header");

  header.addEventListener("click", () => {

    category.classList.toggle("open");

  });

});

/* =========================
   session取得
========================= */

const params =
  new URLSearchParams(location.search);

const session =
  params.get("session");

/* =========================
   ユーザー情報取得
========================= */

async function loadMe(){

  // sessionない
  if(!session){

    document.getElementById("balance")
      .innerText =
      "ログインしてください";

    return;
  }

  try{

    const API_BASE =
      "https://oasisbot-production.up.railway.app";

    const res = await fetch(
     `${API_BASE}/api/casino/me?session=${session}`
    );

    if(!res.ok){

      document.getElementById("balance")
        .innerText =
        "認証失敗";

      return;
    }

    const data = await res.json();

    if(!data.ok){

      document.getElementById("balance")
        .innerText =
        "セッション無効";

      return;
    }

    document.getElementById("balance")
      .innerText =
      `残高：${data.balance.toLocaleString()} rrc`;

  }

  catch(err){

    console.error(err);

    document.getElementById("balance")
      .innerText =
      "通信エラー";

  }

}

loadMe();

</script>

</body>
</html>
