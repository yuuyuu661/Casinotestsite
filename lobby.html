<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>oasis カジノロビー</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:0;

  font-family:
    "Hiragino Sans",
    "Yu Gothic UI",
    sans-serif;

  background:
    radial-gradient(circle at top,#111827 0%,#020617 45%,#000 100%);

  color:#f8fafc;
}

/* =========================
   全体
========================= */

.container{
  width:100%;
  max-width:1200px;
  margin:auto;
  padding:24px;
}

/* =========================
   上部
========================= */

.top-bar{

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;

  margin-bottom:24px;

  flex-wrap:wrap;
}

.back-btn{

  background:#1e293b;
  border:none;

  color:#fff;

  padding:12px 18px;

  border-radius:12px;

  cursor:pointer;

  font-weight:700;

  transition:0.2s;
}

.back-btn:hover{
  background:#334155;
}

.balance{

  color:#facc15;

  font-size:1.05rem;
  font-weight:800;
}

/* =========================
   タイトル
========================= */

.title-box{
  text-align:center;
  margin-bottom:28px;
}

.game-title{

  font-size:clamp(2rem,5vw,3.2rem);

  font-weight:900;

  margin-bottom:12px;

  background:
    linear-gradient(
      90deg,
      #facc15,
      #fde68a,
      #facc15
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.online-box{

  display:inline-flex;
  align-items:center;
  gap:10px;

  padding:10px 18px;

  border-radius:999px;

  background:
    rgba(34,197,94,0.15);

  border:
    1px solid rgba(34,197,94,0.4);

  color:#86efac;

  font-weight:800;
}

/* =========================
   操作エリア
========================= */

.action-area{

  display:flex;
  justify-content:flex-end;

  margin-bottom:24px;
}

.create-btn{

  background:
    linear-gradient(
      135deg,
      #facc15,
      #eab308
    );

  border:none;

  color:#000;

  font-weight:900;

  padding:14px 24px;

  border-radius:14px;

  cursor:pointer;

  font-size:1rem;

  transition:0.2s;
}

.create-btn:hover{
  transform:translateY(-2px);

  box-shadow:
    0 0 18px rgba(250,204,21,0.4);
}

/* =========================
   ロビー一覧
========================= */

.room-list{

  display:flex;
  flex-direction:column;

  gap:18px;
}

/* =========================
   ロビー
========================= */

.room-card{

  background:
    rgba(15,23,42,0.82);

  border:
    1px solid rgba(255,255,255,0.08);

  border-radius:20px;

  padding:22px;

  backdrop-filter:blur(8px);

  transition:0.2s;
}

.room-card:hover{

  transform:translateY(-2px);

  border-color:#facc15;

  box-shadow:
    0 0 20px rgba(250,204,21,0.18);
}

.room-top{

  display:flex;
  justify-content:space-between;
  align-items:center;

  gap:12px;

  flex-wrap:wrap;

  margin-bottom:16px;
}

.room-name{

  font-size:1.2rem;
  font-weight:900;
}

.room-status{

  padding:8px 14px;

  border-radius:999px;

  font-size:0.9rem;
  font-weight:800;
}

/* 待機中 */

.waiting{
  background:
    rgba(34,197,94,0.18);

  color:#86efac;

  border:
    1px solid rgba(34,197,94,0.4);
}

/* 対戦中 */

.playing{
  background:
    rgba(239,68,68,0.18);

  color:#fca5a5;

  border:
    1px solid rgba(239,68,68,0.4);
}

/* =========================
   情報
========================= */

.room-info{

  display:flex;
  gap:20px;

  flex-wrap:wrap;

  margin-bottom:18px;

  color:#cbd5e1;
}

.room-info span{
  font-weight:700;
}

/* =========================
   ボタン
========================= */

.room-buttons{

  display:flex;
  gap:12px;

  flex-wrap:wrap;
}

.join-btn,
.watch-btn{

  border:none;

  padding:12px 18px;

  border-radius:12px;

  cursor:pointer;

  font-weight:800;

  transition:0.2s;
}

.join-btn{

  background:
    linear-gradient(
      135deg,
      #22c55e,
      #16a34a
    );

  color:#fff;
}

.join-btn:hover{
  transform:translateY(-2px);
}

.watch-btn{

  background:#334155;
  color:#fff;
}

.watch-btn:hover{
  background:#475569;
}

/* =========================
   スマホ
========================= */

@media(max-width:700px){

  .container{
    padding:16px;
  }

  .room-top{
    flex-direction:column;
    align-items:flex-start;
  }

}

</style>
</head>
<body>

<div class="container">

  <!-- 上部 -->
  <div class="top-bar">

    <button
      class="back-btn"
      onclick="location.href='index.html'"
    >
      ← トップへ戻る
    </button>

    <div class="balance">
      残高：999,999 rrc
    </div>

  </div>

  <!-- タイトル -->
  <div class="title-box">

    <div
      class="game-title"
      id="gameTitle"
    >
      ⚫ オセロ ロビー
    </div>

    <div class="online-box">
      🟢 現在 8人 プレイ中
    </div>

  </div>

  <!-- 作成 -->
  <div class="action-area">

    <button
      class="create-btn"
      id="createRoomBtn"
    >
      ＋ ロビー作成
    </button>

  </div>

  <!-- ロビー一覧 -->
  <div
    class="room-list"
    id="roomList"
  >

  </div>

</div>

<script>

/* =========================
   ゲーム名取得
========================= */

const params =
  new URLSearchParams(location.search);

const game =
  params.get("game") || "othello";

/* =========================
   タイトル変更
========================= */

const gameTitle =
  document.getElementById("gameTitle");

const gameNames = {

  othello : "⚫ オセロ ロビー",
  poker   : "🃏 ポーカー ロビー",
  daifugo : "👑 大富豪 ロビー",
  chinchiro : "🎲 チンチロ ロビー"

};

gameTitle.innerText =
  gameNames[game] || "🎮 ロビー";

/* =========================
   ダミーロビー
========================= */

const rooms = [

  {
    id:"A102",
    players:1,
    max:2,
    status:"waiting",
    host:"ゅゅ"
  },

  {
    id:"B841",
    players:2,
    max:2,
    status:"playing",
    host:"ゲロ"
  },

  {
    id:"C225",
    players:1,
    max:2,
    status:"waiting",
    host:"しょあ"
  }

];

/* =========================
   描画
========================= */

const roomList =
  document.getElementById("roomList");

function renderRooms(){

  roomList.innerHTML = "";

  rooms.forEach(room => {

    const card =
      document.createElement("div");

    card.className = "room-card";

    const statusText =
      room.status === "waiting"
      ? "待機中"
      : "対戦中";

    const statusClass =
      room.status === "waiting"
      ? "waiting"
      : "playing";

    card.innerHTML = `

      <div class="room-top">

        <div class="room-name">
          ルーム ${room.id}
        </div>

        <div class="room-status ${statusClass}">
          ${statusText}
        </div>

      </div>

      <div class="room-info">

        <div>
          👤 ホスト：
          <span>${room.host}</span>
        </div>

        <div>
          🎮 人数：
          <span>
            ${room.players}/${room.max}
          </span>
        </div>

      </div>

      <div class="room-buttons">

        <button class="join-btn">
          参加
        </button>

        <button class="watch-btn">
          観戦
        </button>

      </div>

    `;

    roomList.appendChild(card);

  });

}

renderRooms();

/* =========================
   ロビー作成
========================= */

document
.getElementById("createRoomBtn")
.addEventListener("click", () => {

  alert("ロビー作成予定！");

});

</script>

</body>
</html>
