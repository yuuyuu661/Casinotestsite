```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>チンチロ</title>

<style>

body{
    margin:0;
    background:
        radial-gradient(circle at top,#1e293b,#020617);
    color:white;
    font-family:sans-serif;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:42px;
    font-weight:bold;
    margin-top:20px;
    margin-bottom:40px;
    letter-spacing:4px;
}

.info-area{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:40px;
}

.info-box{
    background:#0f172a;
    border:2px solid #334155;
    border-radius:16px;
    padding:16px 24px;
    min-width:180px;
    text-align:center;
}

.label{
    color:#94a3b8;
    font-size:14px;
    margin-bottom:8px;
}

.value{
    font-size:24px;
    font-weight:bold;
}

.dice-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:24px;
    margin-top:40px;
    margin-bottom:40px;
    flex-wrap:wrap;
}

.dice{
    width:140px;
    height:140px;

    border-radius:24px;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.5);

    transition:
        transform 0.15s;
}

.dice.rolling{
    animation:
        diceShake 0.12s linear infinite;
}

@keyframes diceShake{

    0%{
        transform:
            rotate(-8deg)
            scale(1.05);
    }

    50%{
        transform:
            rotate(8deg)
            scale(1.1);
    }

    100%{
        transform:
            rotate(-8deg)
            scale(1.05);
    }

}

.result-area{
    text-align:center;
    margin-top:30px;
}

.result-text{
    font-size:36px;
    font-weight:bold;
    margin-bottom:12px;
}

.sub-text{
    color:#cbd5e1;
    font-size:18px;
}

.button-area{
    display:flex;
    justify-content:center;
    gap:16px;
    margin-top:40px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:14px;
    padding:16px 28px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;

    transition:
        transform 0.15s,
        opacity 0.15s;
}

button:hover{
    transform:scale(1.05);
}

button:active{
    transform:scale(0.97);
}

.roll-btn{
    background:#dc2626;
    color:white;
}

.roll-btn:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

.reroll-btn{
    background:#2563eb;
    color:white;
}

.players{
    margin-top:50px;
}

.players-title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

.player-list{
    display:grid;
    grid-template-columns:
        repeat(auto-fit,minmax(220px,1fr));
    gap:16px;
}

.player-card{
    background:#0f172a;
    border:2px solid #334155;
    border-radius:16px;
    padding:16px;
}

.player-name{
    font-size:22px;
    font-weight:bold;
    margin-bottom:8px;
}

.player-status{
    color:#94a3b8;
}

@media(max-width:700px){

    .dice{
        width:90px;
        height:90px;
    }

    .title{
        font-size:32px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        🎲 チンチロ
    </div>

    <div class="info-area">

        <div class="info-box">
            <div class="label">レート</div>
            <div class="value">1000 Spt</div>
        </div>

        <div class="info-box">
            <div class="label">現在ターン</div>
            <div class="value" id="turnText">
                ゆう
            </div>
        </div>

        <div class="info-box">
            <div class="label">振り直し</div>
            <div class="value" id="rerollCount">
                3回
            </div>
        </div>

    </div>

    <div class="dice-wrapper">

        <img
            id="dice1"
            class="dice"
            src="/static/images/dice/1.png"
        >

        <img
            id="dice2"
            class="dice"
            src="/static/images/dice/1.png"
        >

        <img
            id="dice3"
            class="dice"
            src="/static/images/dice/1.png"
        >

    </div>

    <div class="result-area">

        <div
            id="resultText"
            class="result-text"
        >
            サイコロを振ってください
        </div>

        <div
            id="subText"
            class="sub-text"
        >
            親決め中
        </div>

    </div>

    <div class="button-area">

        <button
            id="rollBtn"
            class="roll-btn"
        >
            🎲 振る
        </button>

        <button
            id="rerollBtn"
            class="reroll-btn"
            style="display:none;"
        >
            🔁 振り直す
        </button>

    </div>

    <div class="players">

        <div class="players-title">
            参加プレイヤー
        </div>

        <div class="player-list">

            <div class="player-card">
                <div class="player-name">
                    ゆう
                </div>
                <div class="player-status">
                    待機中
                </div>
            </div>

            <div class="player-card">
                <div class="player-name">
                    Player2
                </div>
                <div class="player-status">
                    待機中
                </div>
            </div>

        </div>

    </div>

</div>



<script>

/* =========================
   Socket
========================= */



/* =========================
   Dice Images
========================= */

const diceImages = [

    "/static/images/dice/1.png",
    "/static/images/dice/2.png",
    "/static/images/dice/3.png",
    "/static/images/dice/4.png",
    "/static/images/dice/5.png",
    "/static/images/dice/6.png"

];

/* =========================
   Elements
========================= */

const dice1 =
    document.getElementById("dice1");

const dice2 =
    document.getElementById("dice2");

const dice3 =
    document.getElementById("dice3");

const rollBtn =
    document.getElementById("rollBtn");

const rerollBtn =
    document.getElementById("rerollBtn");

const resultText =
    document.getElementById("resultText");

const subText =
    document.getElementById("subText");

/* =========================
   Sound
========================= */

const rollSound = new Audio(
    "/static/sounds/dice_roll.mp3"
);

/* =========================
   Roll Button
========================= */

rollBtn.onclick = async () => {

    rollBtn.disabled = true;

    startRoll();

};

/* =========================
   Roll Animation
========================= */

async function startRoll(){

    resultText.textContent =
        "サイコロを振っています…";

    subText.textContent =
        "";

    rollSound.currentTime = 0;
    rollSound.play();

    animateDice(dice1);
    animateDice(dice2);
    animateDice(dice3);

    const value1 =
        await stopDice(dice1,1000);

    const value2 =
        await stopDice(dice2,1600);

    const value3 =
        await stopDice(dice3,2200);

    const result =
        judgeDice([
            value1,
            value2,
            value3
        ]);

    resultText.textContent =
        result.text;

    subText.textContent =
        result.sub;

    rollBtn.disabled = false;

}

/* =========================
   Animate Dice
========================= */

function animateDice(dice){

    dice.classList.add("rolling");

    const interval = setInterval(() => {

        const rand =
            Math.floor(
                Math.random() * 6
            );

        dice.src =
            diceImages[rand];

    },80);

    dice.dataset.interval =
        interval;

}

/* =========================
   Stop Dice
========================= */

function stopDice(
    dice,
    delay
){

    return new Promise(resolve => {

        setTimeout(() => {

            clearInterval(
                dice.dataset.interval
            );

            dice.classList.remove(
                "rolling"
            );

            const value =
                Math.floor(
                    Math.random() * 6
                ) + 1;

            dice.src =
                diceImages[value - 1];

            resolve(value);

        },delay);

    });

}

/* =========================
   Judge Dice
========================= */

function judgeDice(dice){

    dice.sort();

    const text =
        dice.join("・");

    // ピンゾロ
    if(
        dice[0] === 1 &&
        dice[1] === 1 &&
        dice[2] === 1
    ){
        return {
            text:"🎉 ピンゾロ！",
            sub:"5倍"
        };
    }

    // ゾロ目
    if(
        dice[0] === dice[1] &&
        dice[1] === dice[2]
    ){
        return {
            text:`🔥 ${dice[0]}のゾロ目`,
            sub:"3倍"
        };
    }

    // シゴロ
    if(text === "4・5・6"){
        return {
            text:"✨ シゴロ！",
            sub:"2倍"
        };
    }

    // ヒフミ
    if(text === "1・2・3"){
        return {
            text:"💀 ヒフミ…",
            sub:"2倍払い"
        };
    }

    // 通常役
    if(dice[0] === dice[1]){
        return {
            text:`${dice[2]}の目`,
            sub:`${dice[2]}倍`
        };
    }

    if(dice[1] === dice[2]){
        return {
            text:`${dice[0]}の目`,
            sub:`${dice[0]}倍`
        };
    }

    if(dice[0] === dice[2]){
        return {
            text:`${dice[1]}の目`,
            sub:`${dice[1]}倍`
        };
    }

    // 役なし
    return {
        text:"役なし",
        sub:"振り直し可能"
    };

}

</script>

</body>
</html>
```
