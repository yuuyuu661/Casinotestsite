<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK JACK</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:#06130d;color:#f8fafc;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.page{min-height:100vh;padding:24px;display:grid;grid-template-columns:280px minmax(0,1fr) 280px;gap:18px;background:radial-gradient(circle at 50% 20%,#17603a 0,#0a2a1b 40%,#020617 100%)}
.panel{background:rgba(15,23,42,.84);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:18px;box-shadow:0 18px 40px rgba(0,0,0,.28)}
.title{font-size:24px;font-weight:900;color:#facc15;margin:0 0 10px}
.muted{color:#b6c6d8;line-height:1.7;font-size:14px}
.table{display:flex;flex-direction:column;gap:18px;align-items:center;justify-content:center;min-height:calc(100vh - 48px);border:10px solid #7f1d1d;border-radius:36px;background:radial-gradient(circle,#047857 0,#065f46 48%,#064e3b 100%);box-shadow:inset 0 0 0 6px rgba(250,204,21,.35),0 20px 60px rgba(0,0,0,.35);padding:24px}
.hand-box{text-align:center;width:100%}.hand-title{font-size:18px;font-weight:900;color:#fde68a;margin-bottom:10px}.cards{display:flex;justify-content:center;gap:10px;min-height:128px;flex-wrap:wrap}.card{width:82px;height:120px;object-fit:contain;border-radius:7px;filter:drop-shadow(0 8px 8px rgba(0,0,0,.35))}.back{width:82px;height:120px;border:4px solid #fff;border-radius:7px;background:repeating-linear-gradient(45deg,#1d4ed8 0 8px,#172554 8px 16px);box-shadow:0 8px 8px rgba(0,0,0,.35)}
.score{font-weight:900;color:#fff;margin-top:8px}.message{font-size:28px;font-weight:1000;color:#facc15;min-height:36px;text-align:center}.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}.controls button,.side-btn{border:0;border-radius:8px;padding:13px 22px;font-weight:900;font-size:15px;cursor:pointer}.primary{background:#facc15;color:#111827}.action{background:#e5e7eb;color:#111827}.danger{background:#7f1d1d;color:#fff}.disabled{opacity:.45;pointer-events:none}.bet-row{display:grid;gap:8px;margin:14px 0}select{width:100%;background:#020617;color:#fff;border:1px solid #334155;border-radius:8px;padding:12px;font-size:16px;font-weight:800}.stat{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1);padding:10px 0}.stat b{color:#facc15}.rule-list{padding-left:18px;margin:10px 0 0}.rule-list li{margin:8px 0;color:#dbeafe}.back-btn{position:fixed;left:18px;top:18px;background:rgba(15,23,42,.8);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:10px 16px;font-weight:900;cursor:pointer}
@media(max-width:980px){.page{grid-template-columns:1fr;padding:12px}.table{min-height:auto;padding:18px;border-radius:24px}.card,.back{width:62px;height:91px}.panel{order:2}.main{order:1}.back-btn{position:static;margin:10px}}
</style>
</head>
<body>
<button class="back-btn" id="backBtn">← TOP</button>
<main class="page">
  <aside class="panel">
    <h1 class="title">BLACK JACK</h1>
    <div class="stat"><span>残高</span><b id="balance">-</b></div>
    <div class="stat"><span>BET</span><b id="currentBet">-</b></div>
    <div class="stat"><span>払い戻し</span><b id="payout">-</b></div>
    <div class="bet-row">
      <label class="muted" for="betSelect">BET額</label>
      <select id="betSelect">
        <option value="100">100 rrc</option>
        <option value="500">500 rrc</option>
        <option value="1000" selected>1,000 rrc</option>
        <option value="5000">5,000 rrc</option>
        <option value="10000">10,000 rrc</option>
      </select>
    </div>
    <button class="side-btn primary" id="dealBtn">DEAL</button>
  </aside>

  <section class="table main">
    <div class="hand-box">
      <div class="hand-title">DEALER</div>
      <div class="cards" id="dealerCards"></div>
      <div class="score" id="dealerTotal">TOTAL -</div>
    </div>
    <div class="message" id="message">BETして開始</div>
    <div class="hand-box">
      <div class="hand-title">PLAYER</div>
      <div class="cards" id="playerCards"></div>
      <div class="score" id="playerTotal">TOTAL -</div>
    </div>
    <div class="controls">
      <button class="action" id="hitBtn">HIT</button>
      <button class="action" id="standBtn">STAY</button>
      <button class="action" id="doubleBtn">DOUBLE</button>
      <button class="danger" id="surrenderBtn">SURRENDER</button>
    </div>
  </section>

  <aside class="panel">
    <h2 class="title">ルール</h2>
    <p class="muted">21を超えずに、ディーラーより21に近ければ勝ちです。</p>
    <ul class="rule-list">
      <li>Aは1または11、絵札と10は10として数えます。</li>
      <li>ディーラーは17以上になるまでカードを引きます。</li>
      <li>通常勝利はBETの1倍配当、引き分けはBET返還です。</li>
      <li>最初の2枚で21ならBLACK JACK。1.5倍配当です。</li>
      <li>サレンダーは最初の2枚だけ。BETの半分が戻ります。</li>
      <li>ダブルダウンは最初の2枚だけ。BETを倍にして1枚だけ引きます。</li>
    </ul>
  </aside>
</main>

<script>
const API_BASE="https://api.oasis.red";
const params=new URLSearchParams(location.search);
const session=params.get("session");
let state={phase:"idle"};
const $=id=>document.getElementById(id);
function fmt(n){return `${Number(n||0).toLocaleString()} rrc`}
function cardUrl(card){
  if(!card)return null;
  const [suit,rank]=card.split(":");
  return `/static/poker/cards/${suit}_${rank}.png`;
}
function renderCards(target,cards){
  target.innerHTML="";
  (cards||[]).forEach(card=>{
    if(!card){const back=document.createElement("div");back.className="back";target.appendChild(back);return}
    const img=document.createElement("img");img.className="card";img.src=cardUrl(card);img.alt=card;target.appendChild(img);
  });
}
function setActions(active){
  ["hitBtn","standBtn","doubleBtn","surrenderBtn"].forEach(id=>$(id).classList.toggle("disabled",!active));
  $("doubleBtn").classList.toggle("disabled",!active||!state.can_double);
  $("surrenderBtn").classList.toggle("disabled",!active||!state.can_surrender);
}
function render(){
  renderCards($("dealerCards"),state.dealer||[]);
  renderCards($("playerCards"),state.player||[]);
  $("balance").textContent=fmt(state.balance);
  $("currentBet").textContent=state.bet?fmt(state.bet):"-";
  $("payout").textContent=state.payout?fmt(state.payout):"-";
  $("playerTotal").textContent=state.player_total!=null?`TOTAL ${state.player_total}`:"TOTAL -";
  $("dealerTotal").textContent=state.dealer_total!=null?`TOTAL ${state.dealer_total}`:"TOTAL ?";
  $("message").textContent=state.message|| (state.phase==="player_turn"?"アクションを選択":"BETして開始");
  setActions(state.phase==="player_turn");
}
async function loadStatus(){
  if(!session){$("message").textContent="セッションがありません";return}
  const res=await fetch(`${API_BASE}/api/casino/blackjack/status?session=${session}`);
  state=await res.json();render();
}
async function deal(){
  if(!session)return;
  const bet=Number($("betSelect").value);
  const res=await fetch(`${API_BASE}/api/casino/blackjack/deal`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session,bet})});
  if(!res.ok){$("message").textContent="残高不足、またはBETできません";return}
  state=await res.json();render();
}
async function action(action){
  const res=await fetch(`${API_BASE}/api/casino/blackjack/action`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session,action})});
  if(!res.ok){$("message").textContent="操作できません";return}
  state=await res.json();render();
}
$("dealBtn").onclick=deal;
$("hitBtn").onclick=()=>action("hit");
$("standBtn").onclick=()=>action("stand");
$("doubleBtn").onclick=()=>action("double");
$("surrenderBtn").onclick=()=>action("surrender");
$("backBtn").onclick=()=>{location.href=`/${session?`?session=${session}`:""}`};
render();
loadStatus();
</script>
</body>
</html>
