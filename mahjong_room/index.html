<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OASIS 麻雀</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#06130d;color:#f8fafc;font-family:"Yu Gothic UI",sans-serif}.page{min-height:100vh;padding:14px;background:radial-gradient(circle at 50% 35%,#087443,#064e3b 45%,#020617 100%)}button{border:0;border-radius:9px;padding:11px 16px;font-weight:900;cursor:pointer}.top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.panel{background:rgba(15,23,42,.88);border:1px solid rgba(255,255,255,.13);border-radius:12px;padding:14px}.gold{color:#facc15}.waiting{max-width:760px;margin:28px auto}.players{display:grid;gap:10px;margin:14px 0}.player-row{display:flex;justify-content:space-between;padding:12px;background:#0f172a;border-radius:9px}.ready{color:#86efac}.not-ready{color:#fca5a5}.actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}.primary{background:#facc15;color:#111827}.secondary{background:#334155;color:#fff}.danger{background:#dc2626;color:#fff}.table{position:relative;min-height:74vh;max-width:1180px;margin:12px auto;border:8px solid #7c2d12;border-radius:30px;background:#047857;box-shadow:inset 0 0 0 4px #facc1566;padding:12px}.seat{position:absolute;width:min(82%,760px);text-align:center}.seat.self{bottom:12px;left:50%;transform:translateX(-50%)}.seat.top{top:12px;left:50%;transform:translateX(-50%) rotate(180deg)}.seat.left{left:-180px;top:50%;transform:translateY(-50%) rotate(90deg)}.seat.right{right:-180px;top:50%;transform:translateY(-50%) rotate(-90deg)}.seat-name{font-weight:900;margin:4px}.tiles,.discards,.melds{display:flex;justify-content:center;gap:2px;flex-wrap:wrap}.tile{width:42px;height:58px;background:#fff;color:#111827;border:1px solid #cbd5e1;border-radius:4px;padding:2px;display:flex;align-items:center;justify-content:center;font-weight:900;box-shadow:0 2px 4px #0006}.tile.clickable:hover{transform:translateY(-7px);outline:3px solid #facc15}.tile img{width:100%;height:100%;object-fit:contain}.tile.red{box-shadow:inset 0 -4px #dc2626,0 2px 4px #0006}.tile.small{width:29px;height:40px;font-size:11px}.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(90%,360px);text-align:center}.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}.status{font-size:14px;color:#dbeafe}.result{white-space:pre-wrap;line-height:1.6}.hidden{display:none!important}@media(max-width:800px){.table{min-height:680px}.seat.left{left:-245px}.seat.right{right:-245px}.tile{width:31px;height:44px;font-size:11px}.tile.small{width:23px;height:33px}.center{width:250px}}
</style>
</head>
<body><main class="page">
<header class="top"><button class="secondary" id="backBtn">← ロビー</button><div><b class="gold" id="roomTitle">麻雀</b> <span id="roundText"></span></div><div id="wallText">-</div></header>
<section id="waiting" class="panel waiting"><h2 class="gold">対局準備</h2><div id="playerList" class="players"></div><div class="actions"><button id="readyBtn" class="primary">準備完了</button><button id="startBtn" class="danger">START</button></div><p id="waitingMessage" class="status">参加者を待っています</p></section>
<section id="gameTable" class="table hidden">
  <div id="seats"></div>
  <div class="panel center"><div id="centerInfo" class="score-grid"></div><div id="message" class="result">対局中</div><div id="actionButtons" class="actions"></div></div>
</section>
<p style="text-align:center;font-size:12px;color:#94a3b8">牌画像素材：<a href="https://mj-king.net/sozai/" target="_blank" rel="noopener" style="color:#fde68a">麻雀王国</a></p>
</main>
<script>
const API_BASE="https://api.oasis.red";
const params=new URLSearchParams(location.search),roomId=params.get("room"),session=params.get("session"),watch=params.get("watch")==="1";
let me=null,room=null,game=null,ready=false,busy=false,riichiMode=false;
const $=id=>document.getElementById(id);
const tileLabels={east:"東",south:"南",west:"西",north:"北",white:"白",green:"發",red:"中"};
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c])}
function tileHtml(tile,small=false,clickable=false){if(!tile)return"";const label=tileLabels[tile.code]||tile.code;const src=`/mahjong/tiles/${tile.code}.png`;return `<button class="tile ${small?"small":""} ${tile.red?"red":""} ${clickable?"clickable":""}" ${clickable?`data-tile="${tile.id}"`:"disabled"}><img src="${src}" alt="${esc(label)}" onerror="this.remove();this.parentNode.append(document.createTextNode('${esc(label)}'))"></button>`}
async function post(path,body={}){if(busy)return;busy=true;try{const res=await fetch(`${API_BASE}/api/casino${path}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session,room_id:roomId,...body})});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.detail||data.error||"操作に失敗しました");game=data.game||game;render()}catch(e){alert(e.message)}finally{busy=false}}
async function load(){try{const [meRes,roomRes,stateRes]=await Promise.all([fetch(`${API_BASE}/api/casino/me?session=${session}`),fetch(`${API_BASE}/api/casino/room-info?room_id=${roomId}`),fetch(`${API_BASE}/api/casino/mahjong/state?room_id=${roomId}&session=${session}`)]);me=await meRes.json();room=await roomRes.json();const state=await stateRes.json();if(state.ok)game=state.game;render()}catch(e){$("message").textContent="接続を待っています"}}
function renderWaiting(){const players=game.players||[];$("roomTitle").textContent=room?.room?.room_name||"麻雀";$("playerList").innerHTML=players.map(p=>`<div class="player-row"><span>${esc(p.user_name)}${p.user_id===game.host_user_id?" 👑":""}</span><b class="${p.ready?"ready":"not-ready"}">${p.ready?"準備完了":"準備中"}</b></div>`).join("");const mine=players.find(p=>String(p.user_id)===String(me?.user_id));ready=!!mine?.ready;$("readyBtn").textContent=ready?"準備を解除":"準備完了";$("readyBtn").classList.toggle("hidden",watch||String(me?.user_id)===String(game.host_user_id));const full=players.length===(room?.room?.max_players||game.player_count);const allReady=players.length>0&&players.every(p=>p.ready);$("startBtn").classList.toggle("hidden",watch||String(me?.user_id)!==String(game.host_user_id));$("startBtn").disabled=!(full&&allReady);$("waitingMessage").textContent=!full?`参加者を待っています（${players.length}/${room?.room?.max_players}）`:!allReady?"全員の準備完了を待っています":"ホストがSTARTできます"}
function relativeSeats(){const players=game.players||[];const myIndex=Math.max(0,players.findIndex(p=>String(p.user_id)===String(me?.user_id)));return players.map((p,i)=>({...p,relative:(i-myIndex+players.length)%players.length}))}
function renderSeat(p){const pos=["self","right","top","left"][p.relative]||"top",hand=game.hands?.[p.user_id],drawn=game.drawn_tiles?.[p.user_id],mine=String(p.user_id)===String(me?.user_id),myTurn=mine&&game.phase==="discard"&&game.players[game.current_turn]?.user_id===p.user_id;let handHtml=Array.isArray(hand)?hand.map(t=>tileHtml(t,false,myTurn&&!watch)).join(""):Array.from({length:hand?.count||0},()=>`<span class="tile"></span>`).join("");if(mine&&drawn?.id!=null)handHtml+=tileHtml(drawn,false,myTurn&&!watch);const discards=(game.discards?.[p.user_id]||[]).map(t=>tileHtml(t,true)).join("");const melds=(game.melds?.[p.user_id]||[]).flatMap(m=>m.tiles||[]).map(t=>tileHtml(t,true)).join("");const nuki=(game.nuki?.[p.user_id]||[]).map(t=>tileHtml(t,true)).join("");return `<div class="seat ${pos}"><div class="seat-name">${esc(p.user_name)} ${Number(game.scores?.[p.user_id]||0).toLocaleString()}点</div><div class="melds">${melds}${nuki}</div><div class="tiles">${handHtml}</div><div class="discards">${discards}</div></div>`}
function addAction(label,cls,fn){const b=document.createElement("button");b.className=cls;b.textContent=label;b.onclick=fn;$("actionButtons").appendChild(b)}
function renderActions(){const box=$("actionButtons");box.innerHTML="";if(watch)return;const pending=game.pending_calls;if(pending){for(const option of pending.options||[])addAction(({ron:"ロン",pon:"ポン",kan:"カン",chi:"チー"})[option.action],option.action==="ron"?"danger":"primary",()=>post("/mahjong/call",{action:option.action,tiles:option.tiles}));addAction("パス","secondary",()=>post("/mahjong/pass"));return}const mine=String(game.players?.[game.current_turn]?.user_id)===String(me?.user_id),legal=game.legal_actions||{};if(game.phase==="discard"&&mine){if(legal.can_tsumo)addAction("ツモ","danger",()=>post("/mahjong/tsumo"));if(legal.can_kyuushu)addAction("九種九牌","secondary",()=>post("/mahjong/kyuushu"));if((legal.riichi_discards||[]).length)addAction(riichiMode?"リーチ選択中":"リーチ","primary",()=>{riichiMode=!riichiMode;render()});for(const tiles of legal.ankan||[])addAction("暗槓","secondary",()=>post("/mahjong/ankan",{tiles}));for(const item of legal.kakan||[])addAction("加槓","secondary",()=>post("/mahjong/kakan",item));for(const tile_id of legal.nuki||[])addAction("北抜き","secondary",()=>post("/mahjong/nuki",{tile_id}))}if(game.phase==="hand_result"&&String(me?.user_id)===String(game.host_user_id))addAction("次局へ","primary",()=>post("/mahjong/continue"))}
function renderGame(){$("roundText").textContent=`${game.round_wind==="east"?"東":"南"}${game.hand_number}局 ${game.honba}本場`;$("wallText").textContent=`残り ${game.wall_remaining}枚`;$("seats").innerHTML=relativeSeats().map(renderSeat).join("");$("centerInfo").innerHTML=`<div>供託 ${game.riichi_sticks}</div><div>${game.player_count===3?"三麻":"四麻"}</div>`;$("message").textContent=game.result?JSON.stringify(game.result,null,2):game.phase==="calls"?"鳴きを選択してください":game.players?.[game.current_turn]?.user_name+" の手番";renderActions();const allowed=new Set(game.legal_actions?.riichi_discards||[]);document.querySelectorAll("[data-tile]").forEach(b=>b.onclick=()=>{const id=Number(b.dataset.tile);if(riichiMode&&!allowed.has(id)){alert("その牌ではリーチできません");return}post("/mahjong/discard",{tile_id:id,riichi:riichiMode});riichiMode=false})}
function render(){if(!game)return;const waiting=game.phase==="waiting";$("waiting").classList.toggle("hidden",!waiting);$("gameTable").classList.toggle("hidden",waiting);waiting?renderWaiting():renderGame()}
$("readyBtn").onclick=()=>post("/mahjong/ready",{ready:!ready});$("startBtn").onclick=()=>post("/mahjong/start");$("backBtn").onclick=()=>location.href=`/lobby?game=mahjong&session=${session}`;
load();setInterval(load,1500);
</script></body></html>
