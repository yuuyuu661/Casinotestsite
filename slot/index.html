<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OASIS SLOT</title>
<link rel="icon" href="data:,">
<style>
*{box-sizing:border-box}
:root{--gold:#facc15;--red:#dc2626;--panel:#111827;--line:rgba(255,255,255,.12)}
body{margin:0;min-height:100vh;background:#030712;color:#f8fafc;font-family:"Yu Gothic UI","Hiragino Sans",sans-serif}
button,select,input{font:inherit}
button{border:0;border-radius:8px;font-weight:900;cursor:pointer}
button:disabled{opacity:.45;cursor:not-allowed}
.page{width:min(1440px,100%);margin:auto;padding:18px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.back{padding:11px 16px;background:#1f2937;color:#fff;border:1px solid var(--line)}
.wallet{display:flex;gap:18px;font-weight:900}.balance{color:var(--gold)}
.title{text-align:center;margin:12px 0 18px;font-size:clamp(2rem,5vw,3.6rem);color:var(--gold)}
.layout{display:grid;grid-template-columns:minmax(230px,.72fr) minmax(620px,1.8fr) minmax(230px,.72fr);gap:16px;align-items:start}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px}
.panel-title{color:var(--gold);font-size:1.12rem;font-weight:900;margin-bottom:12px}
.paytable{width:100%;border-collapse:collapse;font-size:.88rem}
.paytable th,.paytable td{padding:8px 5px;border-bottom:1px solid var(--line);text-align:center}
.symbol-name{display:flex;align-items:center;gap:7px;text-align:left;font-weight:800}
.mini-symbol{width:28px;height:28px;object-fit:contain}
.machine{position:relative;padding:22px;background:#450a0a;border:5px solid var(--gold);box-shadow:0 0 30px rgba(250,204,21,.25)}
.machine.bonus{background:#312e81;box-shadow:0 0 36px rgba(129,140,248,.55)}
.bonus-banner{display:none;margin-bottom:14px;padding:10px;background:#4338ca;border-radius:8px;font-weight:900;color:#fff}
.machine.bonus .bonus-banner{display:block}
.reels{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;background:#020617;padding:10px;border-radius:8px}
.reel{min-width:0}
.reel-window{position:relative;height:366px;overflow:hidden;background:#f8fafc;border:3px solid #374151;border-radius:6px}
.reel-window::before,.reel-window::after{content:"";position:absolute;left:0;right:0;height:45px;background:rgba(15,23,42,.42);z-index:2;pointer-events:none}
.reel-window::before{top:0}.reel-window::after{bottom:0}
.symbol{height:90px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #d1d5db}
.symbol img{width:76px;height:76px;object-fit:contain}
.symbol.win{background:#fef08a;box-shadow:inset 0 0 18px #f59e0b}
.reel-strip.spinning{animation:reelMove .65s linear infinite;will-change:transform}
.reel-strip:not(.spinning){transform:translateY(-45px)}
@keyframes reelMove{from{transform:translateY(-540px)}to{transform:translateY(0)}}
.stop-btn{width:100%;margin-top:9px;padding:11px 4px;background:#ef4444;color:#fff}
.controls{display:flex;align-items:end;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:18px}
.control{display:grid;gap:6px;text-align:left;color:#cbd5e1;font-weight:800}
select{min-width:150px;padding:12px;background:#0f172a;color:#fff;border:1px solid var(--line);border-radius:8px}
.spin-btn{min-width:180px;padding:14px 25px;background:var(--gold);color:#111827;font-size:1.15rem}
.result{min-height:58px;margin-top:15px;padding:12px;text-align:center;font-size:1.25rem;font-weight:900}
.result.win{color:#fde047}.result.error{color:#fca5a5}
.stat-list{display:grid;gap:10px}.stat{display:flex;justify-content:space-between;gap:10px;padding:10px;background:#0f172a;border-radius:6px}
.stat strong{color:var(--gold)}
.volume{width:100%}.note{color:#94a3b8;font-size:.85rem;line-height:1.6;margin-top:12px}
.coin{position:fixed;top:-50px;width:34px;height:34px;pointer-events:none;z-index:20;animation:fall 1.5s linear forwards}
@keyframes fall{to{top:105vh;transform:rotate(540deg);opacity:0}}
@media(max-width:1050px){.layout{grid-template-columns:1fr}.machine{order:-1}.side-pay{order:2}.side-stat{order:3}}
@media(max-width:700px){.page{padding:10px}.machine{padding:10px;border-width:3px}.reels{gap:3px;padding:5px}.reel-window{height:262px}.reel-window::before,.reel-window::after{height:32px}.symbol{height:64px}.symbol img{width:54px;height:54px}.reel-strip:not(.spinning){transform:translateY(-32px)}.reel-strip.spinning{animation-name:reelMoveMobile}@keyframes reelMoveMobile{from{transform:translateY(-384px)}to{transform:translateY(0)}}.stop-btn{font-size:.75rem;padding:10px 2px}.wallet{width:100%;justify-content:space-between}}
</style>
</head>
<body>
<main class="page">
  <header class="topbar">
    <button id="backBtn" class="back">トップへ戻る</button>
    <div class="wallet">
      <span id="balanceText" class="balance">残高取得中...</span>
      <span id="freeSpinText">FREE 0</span>
    </div>
  </header>
  <h1 class="title">OASIS SLOT</h1>

  <section class="layout">
    <aside class="panel side-pay">
      <div class="panel-title">配当倍率</div>
      <table class="paytable">
        <thead><tr><th>絵柄</th><th>3</th><th>4</th><th>5</th></tr></thead>
        <tbody id="paytableBody"></tbody>
      </table>
      <div class="note">中央3段の各横ラインで、同じ絵柄が3個以上連続すると配当です。ORBも横に3個以上連続するとフリースピンを獲得します。</div>
    </aside>

    <section id="machine" class="panel machine">
      <div class="bonus-banner">BONUS MODE / フリースピン中</div>
      <div id="reels" class="reels"></div>
      <div class="controls">
        <label class="control">BET
          <select id="betSelect">
            <option value="100">100 rrc</option>
            <option value="500">500 rrc</option>
            <option value="1000" selected>1,000 rrc</option>
            <option value="5000">5,000 rrc</option>
            <option value="10000">10,000 rrc</option>
          </select>
        </label>
        <button id="spinBtn" class="spin-btn">SPIN</button>
      </div>
      <div id="result" class="result">BETを選んでSPIN</div>
    </section>

    <aside class="panel side-stat">
      <div class="panel-title">ゲーム情報</div>
      <div class="stat-list">
        <div class="stat"><span>今回のBET</span><strong id="betStat">-</strong></div>
        <div class="stat"><span>獲得</span><strong id="winStat">-</strong></div>
        <div class="stat"><span>フリースピン</span><strong id="freeStat">0</strong></div>
      </div>
      <label class="control" style="margin-top:16px">音量
        <input id="volume" class="volume" type="range" min="0" max="100" value="35">
      </label>
      <div class="note">リールは好きな順番でSTOPできます。一定時間後は自動で停止します。</div>
    </aside>
  </section>
</main>

<audio id="bgmNormal" src="/slot/sounds/bgm_normal.mp3" loop preload="auto"></audio>
<audio id="bgmBonus" src="/slot/sounds/bgm_bonus.mp3" loop preload="auto"></audio>
<audio id="startSound" src="/slot/sounds/start.mp3" preload="auto"></audio>
<audio id="stopSound" src="/slot/sounds/stop.mp3" preload="auto"></audio>
<audio id="win3Sound" src="/slot/sounds/win3.mp3" preload="auto"></audio>
<audio id="win4Sound" src="/slot/sounds/win4.mp3" preload="auto"></audio>
<audio id="win5Sound" src="/slot/sounds/win5.mp3" preload="auto"></audio>

<script>
const API_BASE = "https://api.oasis.red";
const session = new URLSearchParams(location.search).get("session");
const symbols = ["seven","gem","bell","grape","lemon","slime","orb"];
const payouts = {
  seven:[60,300,1500],gem:[12,60,300],bell:[5,24,90],
  grape:[3,15,60],lemon:[2,9,24],slime:[0,3,13]
};
const labels = {seven:"SEVEN",gem:"GEM",bell:"BELL",grape:"GRAPE",lemon:"LEMON",slime:"SLIME"};
const sounds = ["bgmNormal","bgmBonus","startSound","stopSound","win3Sound","win4Sound","win5Sound"]
  .map(id => document.getElementById(id));
const reelsEl = document.getElementById("reels");
const spinBtn = document.getElementById("spinBtn");
const betSelect = document.getElementById("betSelect");
const resultEl = document.getElementById("result");
const machine = document.getElementById("machine");
let balance = 0;
let freeSpins = 0;
let spinning = false;
let spinResult = null;
let stopped = Array(5).fill(true);
let landed = Array(5).fill(true);
let queuedStops = new Set();
let autoStopTimers = [];

function imageFor(symbol, bonus = false){
  const suffix = bonus && symbol !== "orb" ? "_bonus" : "";
  return `/slot/images/${symbol}${suffix}.png`;
}

function randomSymbol(){
  return symbols[Math.floor(Math.random() * symbols.length)];
}

function symbolNode(symbol, bonus = false){
  const cell = document.createElement("div");
  cell.className = "symbol";
  const image = document.createElement("img");
  image.src = imageFor(symbol, bonus);
  image.alt = symbol;
  cell.appendChild(image);
  return cell;
}

function buildReels(){
  reelsEl.innerHTML = "";
  for(let column = 0; column < 5; column++){
    const reel = document.createElement("div");
    reel.className = "reel";
    const windowEl = document.createElement("div");
    windowEl.className = "reel-window";
    const strip = document.createElement("div");
    strip.className = "reel-strip";
    const pattern = Array.from({length:6}, () => randomSymbol());
    [...pattern, ...pattern].forEach(symbol => strip.appendChild(symbolNode(symbol, freeSpins > 0)));
    windowEl.appendChild(strip);
    const stop = document.createElement("button");
    stop.className = "stop-btn";
    stop.textContent = `STOP ${column + 1}`;
    stop.disabled = true;
    stop.addEventListener("click", () => stopReel(column));
    reel.append(windowEl, stop);
    reelsEl.appendChild(reel);
  }
}

function updateStatus(){
  document.getElementById("balanceText").textContent = `残高 ${balance.toLocaleString()} rrc`;
  document.getElementById("freeSpinText").textContent = `FREE ${freeSpins}`;
  document.getElementById("freeStat").textContent = freeSpins;
  machine.classList.toggle("bonus", freeSpins > 0);
  betSelect.disabled = spinning || freeSpins > 0;
  renderPaytable(freeSpins > 0);
}

function startReels(){
  [...reelsEl.querySelectorAll(".reel-strip")].forEach(strip => {
    strip.innerHTML = "";
    const pattern = Array.from({length:6}, () => randomSymbol());
    [...pattern, ...pattern].forEach(symbol => strip.appendChild(symbolNode(symbol, freeSpins > 0)));
    strip.classList.add("spinning");
  });
  [...reelsEl.querySelectorAll(".stop-btn")].forEach(button => button.disabled = false);
}

function stopReel(column){
  if(!spinning || stopped[column]) return;
  if(!spinResult){
    queuedStops.add(column);
    return;
  }
  stopped[column] = true;
  queuedStops.delete(column);
  const reel = reelsEl.children[column];
  const strip = reel.querySelector(".reel-strip");
  const stopButton = reel.querySelector(".stop-btn");
  stopButton.disabled = true;
  const currentTransform = getComputedStyle(strip).transform;
  const currentY = currentTransform === "none"
    ? 0
    : new DOMMatrixReadOnly(currentTransform).m42;
  const symbolHeight = strip.firstElementChild.getBoundingClientRect().height;
  const bonusArt = spinResult.is_free_spin || spinResult.bonus;
  const finalSymbols = [
    randomSymbol(),
    ...spinResult.grid.map(row => row[column]),
    randomSymbol()
  ];
  const landingSymbols = document.createDocumentFragment();
  finalSymbols.forEach(symbol => {
    landingSymbols.appendChild(symbolNode(symbol, bonusArt));
  });

  strip.classList.remove("spinning");
  strip.style.transition = "none";
  strip.insertBefore(landingSymbols, strip.firstChild);
  strip.style.transform = `translateY(${currentY - finalSymbols.length * symbolHeight}px)`;
  strip.getBoundingClientRect();
  requestAnimationFrame(() => {
    strip.style.transition = "transform .72s cubic-bezier(.12,.72,.22,1)";
    strip.style.transform = `translateY(-${symbolHeight / 2}px)`;
  });
  playSound("stopSound");

  setTimeout(() => {
    strip.innerHTML = "";
    finalSymbols.forEach(symbol => strip.appendChild(symbolNode(symbol, bonusArt)));
    strip.style.transition = "";
    strip.style.transform = "";
    landed[column] = true;
    if(landed.every(Boolean)) finishSpin();
  }, 760);
}

function playSound(id){
  const audio = document.getElementById(id);
  audio.currentTime = 0;
  audio.play().catch(() => {});
}

function setBgm(bonus){
  const normal = document.getElementById("bgmNormal");
  const bonusBgm = document.getElementById("bgmBonus");
  const active = bonus ? bonusBgm : normal;
  const inactive = bonus ? normal : bonusBgm;
  inactive.pause();
  active.play().catch(() => {});
}

function highlightWins(wins){
  wins.forEach(win => {
    const startColumn = Number.isInteger(win.start_column)
      ? win.start_column
      : 0;
    for(let offset = 0; offset < win.count; offset++){
      const column = startColumn + offset;
      const reel = reelsEl.children[column];
      if(!reel) continue;
      reel.querySelectorAll(".symbol")[win.row + 1]?.classList.add("win");
    }
  });
}

function dropCoins(count){
  for(let i = 0; i < count; i++){
    setTimeout(() => {
      const coin = document.createElement("img");
      coin.src = "/slot/images/coin.png";
      coin.className = "coin";
      coin.style.left = `${Math.random() * 96}vw`;
      document.body.appendChild(coin);
      setTimeout(() => coin.remove(), 1700);
    }, i * 25);
  }
}

function finishSpin(){
  autoStopTimers.forEach(clearTimeout);
  highlightWins(spinResult.wins);
  balance = spinResult.balance;
  freeSpins = spinResult.free_spins_remaining;
  document.getElementById("betStat").textContent =
    `${spinResult.bet.toLocaleString()} rrc${spinResult.is_free_spin ? " / FREE" : ""}`;
  document.getElementById("winStat").textContent = `${spinResult.payout.toLocaleString()} rrc`;

  resultEl.className = "result";
  if(spinResult.payout > 0){
    resultEl.classList.add("win");
    resultEl.textContent = `${spinResult.payout.toLocaleString()} rrc 獲得！`;
    dropCoins(spinResult.payout >= spinResult.bet * 30 ? 60 : 30);
    playSound(spinResult.payout >= spinResult.bet * 100 ? "win5Sound" :
      spinResult.payout >= spinResult.bet * 20 ? "win4Sound" : "win3Sound");
  }else{
    resultEl.textContent = "ハズレ";
  }
  if(spinResult.free_spins_awarded > 0){
    resultEl.classList.add("win");
    resultEl.textContent += ` / FREE SPIN +${spinResult.free_spins_awarded}`;
    dropCoins(70);
  }
  spinning = false;
  spinBtn.disabled = false;
  updateStatus();
  setBgm(freeSpins > 0);
}

async function spin(){
  if(spinning || !session) return;
  spinning = true;
  spinResult = null;
  stopped = Array(5).fill(false);
  landed = Array(5).fill(false);
  queuedStops.clear();
  spinBtn.disabled = true;
  betSelect.disabled = true;
  resultEl.className = "result";
  resultEl.textContent = freeSpins > 0 ? "FREE SPIN!" : "抽選中...";
  playSound("startSound");
  setBgm(freeSpins > 0);
  startReels();

  try{
    const response = await fetch(`${API_BASE}/api/casino/slot/spin`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({session,bet:Number(betSelect.value)})
    });
    const data = await response.json();
    if(!response.ok || !data.ok) throw new Error(data.detail || "スピンに失敗しました");
    spinResult = data;
    [...queuedStops].forEach(stopReel);
    for(let column = 0; column < 5; column++){
      autoStopTimers.push(setTimeout(() => stopReel(column), 3200 + column * 450));
    }
  }catch(error){
    [...reelsEl.querySelectorAll(".reel-strip")].forEach(strip => strip.classList.remove("spinning"));
    [...reelsEl.querySelectorAll(".stop-btn")].forEach(button => button.disabled = true);
    buildReels();
    resultEl.className = "result error";
    resultEl.textContent = error.message === "Insufficient balance" ? "残高が不足しています" : error.message;
    spinning = false;
    spinBtn.disabled = false;
    updateStatus();
  }
}

async function init(){
  if(!session){
    resultEl.className = "result error";
    resultEl.textContent = "トップページからログインしてください";
    spinBtn.disabled = true;
    return;
  }
  try{
    const [meResponse, statusResponse] = await Promise.all([
      fetch(`${API_BASE}/api/casino/me?session=${session}`),
      fetch(`${API_BASE}/api/casino/slot/status?session=${session}`)
    ]);
    const me = await meResponse.json();
    const status = await statusResponse.json();
    if(!me.ok || !status.ok) throw new Error();
    balance = Number(me.balance || 0);
    freeSpins = Number(status.free_spins_remaining || 0);
    if(status.bonus_bet) betSelect.value = String(status.bonus_bet);
    updateStatus();
  }catch{
    resultEl.className = "result error";
    resultEl.textContent = "ゲーム情報を取得できませんでした";
    spinBtn.disabled = true;
  }
}

function renderPaytable(bonus){
  document.getElementById("paytableBody").innerHTML = Object.entries(payouts).map(([symbol, values]) => `
    <tr>
      <td class="symbol-name"><img class="mini-symbol" src="${imageFor(symbol, bonus)}" alt="">${labels[symbol]}</td>
      ${values.map(value => `<td>${value ? `x${value}` : "-"}</td>`).join("")}
    </tr>
  `).join("");
}

document.getElementById("volume").addEventListener("input", event => {
  sounds.forEach(sound => sound.volume = Number(event.target.value) / 100);
});
sounds.forEach(sound => sound.volume = .35);
spinBtn.addEventListener("click", spin);
document.getElementById("backBtn").addEventListener("click", () => {
  location.href = `/${session ? `?session=${session}` : ""}`;
});
buildReels();
renderPaytable(false);
init();
</script>
</body>
</html>
