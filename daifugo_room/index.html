<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>大富豪</title>
<style>
:root{--bg:#07111f;--panel:#111c2e;--line:#2b3b52;--gold:#facc15;--green:#146c43;--red:#ef4444}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 35%,#153b32,#07111f 65%);color:#f8fafc;font-family:Arial,"Noto Sans JP",sans-serif}button,input{font:inherit}.page{max-width:1700px;margin:auto;padding:14px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px}.back,.control{border:1px solid var(--line);border-radius:7px;padding:10px 15px;background:#17243a;color:#fff;font-weight:800;cursor:pointer}.balance{color:var(--gold);font-weight:1000}.title{text-align:center;margin:8px 0 14px;color:var(--gold);letter-spacing:2px}.status{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;margin-bottom:12px}.pill{padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:#0f1b2d;font-weight:800}.layout{display:grid;grid-template-columns:270px minmax(0,1fr) 270px;gap:12px}.panel{background:rgba(15,27,45,.95);border:1px solid var(--line);border-radius:8px;padding:13px}.tabs{display:flex;gap:5px;margin-bottom:10px}.tab{flex:1;border:0;border-radius:6px;padding:9px;background:#26364f;color:#cbd5e1;font-weight:900}.tab.active{background:var(--gold);color:#111827}.tab-content{display:none}.tab-content.active{display:block}.rules{display:grid;gap:6px}.rule{display:flex;justify-content:space-between;padding:7px 8px;background:#17243a;border-radius:5px}.rule.off{opacity:.4}.chat-box{height:350px;overflow:auto;display:grid;align-content:start;gap:7px}.chat-message{padding:8px;background:#17243a;border-radius:6px}.chat-user{color:var(--gold);font-weight:900}.chat-row{display:flex;gap:6px;margin-top:8px}.chat-row input{min-width:0;flex:1;padding:9px;border:1px solid var(--line);border-radius:6px;background:#08111f;color:#fff}.table{min-height:650px;border:8px solid #592f18;border-radius:42px;background:radial-gradient(circle,#198754,#0d5738 75%);padding:24px 14px;display:flex;flex-direction:column;align-items:center;position:relative;box-shadow:inset 0 0 45px #052e20}.phase{font-size:1.2rem;font-weight:1000;text-align:center}.flags{min-height:28px;color:#fde68a;font-weight:900;margin-top:5px}.table-cards{display:flex;justify-content:center;align-items:center;min-height:155px;margin:25px 0 8px}.table-cards .card{margin-left:-28px}.table-cards .card:first-child{margin-left:0}.last-player{min-height:25px;font-weight:800}.hand-wrap{margin-top:auto;width:100%}.hand-title{text-align:center;font-weight:1000;margin-bottom:8px}.hand{display:flex;justify-content:flex-start;align-items:flex-end;min-height:155px;overflow-x:auto;padding:8px 72px}.card{width:82px;height:120px;border-radius:7px;border:2px solid #d7dde6;background:#fff;object-fit:cover;box-shadow:0 4px 10px #0008;flex:0 0 auto}.hand .card{margin-left:-32px;cursor:pointer;transition:transform .15s,border-color .15s}.hand .card:first-child{margin-left:0}.hand .card.selected{transform:translateY(-22px);border:4px solid var(--gold)}.joker{background:#fff;object-fit:cover}.actions{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:12px}.play{background:var(--gold);color:#111827}.pass{background:#334155}.ready{background:#2563eb}.start{background:#16a34a}.danger{background:#b91c1c}.message{min-height:27px;text-align:center;color:#fde68a;font-weight:900;margin-top:7px}.players{display:grid;gap:8px}.player{padding:10px;background:#17243a;border:1px solid transparent;border-radius:7px}.player.turn{border-color:var(--gold)}.player.done{border-color:#22c55e}.player-top{display:flex;justify-content:space-between;font-weight:900}.role{color:var(--gold);font-size:.85rem;margin-top:5px}.rank{font-size:1.2rem;color:#4ade80;font-weight:1000}.continue-box{display:none;text-align:center;margin-top:15px;padding:14px;border:1px solid var(--gold);border-radius:7px;background:#17243a}.continue-box.show{display:block}.exchange-note{display:none;text-align:center;padding:10px;background:#4c1d95;border-radius:7px;font-weight:900}.exchange-note.show{display:block}.cutin{position:fixed;inset:0;z-index:20;display:none;place-items:center;pointer-events:none;background:rgba(2,6,23,.28)}.cutin.show{display:grid}.cutin-inner{width:100%;padding:25px;text-align:center;background:linear-gradient(90deg,transparent,#b91c1c 20%,#7f1d1d 80%,transparent);animation:cutin .35s ease-out}.cutin-title{font-size:clamp(2.2rem,8vw,5rem);font-weight:1000;color:#fff;text-shadow:4px 4px #111}.cutin-sub{font-size:1.25rem;color:#fde68a;font-weight:900}@keyframes cutin{from{transform:translateX(-100%)}to{transform:translateX(0)}}button:disabled{opacity:.4;cursor:not-allowed}
@media(max-width:1050px){.layout{grid-template-columns:1fr}.table-panel{order:-1}.table{min-height:580px}.chat-box{height:220px}}@media(max-width:600px){.page{padding:7px}.panel{padding:8px}.table{min-height:520px;padding:15px 4px;border-width:5px;border-radius:25px}.card{width:63px;height:92px}.hand{justify-content:flex-start;padding-left:35px}.hand .card{margin-left:-25px}.status{font-size:.8rem}.title{font-size:1.5rem}}
</style>
</head>
<body>
<main class="page">
  <header class="topbar"><button id="backBtn" class="back">ロビーへ戻る</button><div id="balance" class="balance">残高取得中...</div></header>
  <h1 class="title">大富豪</h1>
  <div class="status">
    <span id="roundPill" class="pill">ROUND 0</span><span id="turnPill" class="pill">待機中</span>
    <span id="directionPill" class="pill">時計回り</span><span id="ratePill" class="pill">- rrc</span>
  </div>
  <section class="layout">
    <aside class="panel">
      <div class="tabs"><button class="tab active" data-tab="rulesTab">ルール</button><button class="tab" data-tab="chatTab">チャット</button></div>
      <div id="rulesTab" class="tab-content active"><div id="rules" class="rules"></div></div>
      <div id="chatTab" class="tab-content"><div id="chatBox" class="chat-box"></div><div class="chat-row"><input id="chatInput" maxlength="200"><button id="chatSend" class="control">送信</button></div></div>
    </aside>
    <section class="panel table-panel">
      <div class="table">
        <div id="phase" class="phase">参加者を待っています</div><div id="flags" class="flags"></div>
        <div id="tableCards" class="table-cards"></div><div id="lastPlayer" class="last-player"></div>
        <div id="exchangeNote" class="exchange-note"></div>
        <div class="hand-wrap"><div class="hand-title">YOUR HAND <span id="handCount"></span></div><div id="hand" class="hand"></div></div>
        <div id="waitingActions" class="actions"><button id="readyBtn" class="control ready">準備完了</button><button id="startBtn" class="control start">ゲーム開始</button></div>
        <div id="playActions" class="actions" style="display:none"><button id="playBtn" class="control play">選択したカードを出す</button><button id="passBtn" class="control pass">パス</button></div>
        <div id="exchangeActions" class="actions" style="display:none"><button id="exchangeBtn" class="control play">このカードを渡す</button></div>
        <div id="continueBox" class="continue-box"><strong>もう一戦しますか？</strong><div class="actions"><button id="continueYes" class="control start">連戦する</button><button id="continueNo" class="control danger">ここで終了</button></div><div id="voteText"></div></div>
        <div id="message" class="message"></div>
      </div>
    </section>
    <aside class="panel"><div style="color:var(--gold);font-weight:1000;margin-bottom:10px">プレイヤー / 階級</div><div id="players" class="players"></div></aside>
  </section>
</main>
<div id="cutin" class="cutin"><div class="cutin-inner"><div id="cutinTitle" class="cutin-title"></div><div id="cutinSub" class="cutin-sub"></div></div></div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const params=new URLSearchParams(location.search),roomId=params.get("room"),session=params.get("session"),API="https://api.oasis.red";
let me=null,room=null,game=null,selected=new Set(),lastCutin=null;
const ruleLabels={joker_two:"ジョーカー2枚",revolution:"革命",stairs:"階段",eight_cut:"8切り",suit_lock:"しばり",number_lock:"数しば",spade_three:"スペ3返し",five_skip:"5スキップ",nine_reverse:"9リバース",jack_back:"Jバック",foul_finish:"反則上がり"};
const errors={not_your_turn:"あなたの番ではありません",invalid_cards:"カードの組み合わせが不正です",diamond_three_required:"最初はダイヤの3を含めてください",same_shape_required:"場と同じ種類・枚数で出してください",card_too_weak:"場より強いカードを出してください",suit_locked:"しばり中です",number_locked:"数しば中です",cannot_pass:"親はパスできません",invalid_exchange:"交換するカードを指定枚数選んでください",insufficient_balance:"誰かの残高が不足しています",not_ready:"3人以上かつ全員の準備が必要です"};
const suits={s:"spades",h:"hearts",d:"diamonds",c:"clubs"};
function fmt(n){return `${Number(n||0).toLocaleString()} rrc`}
function cardPath(card){if(card.startsWith("X"))return "/static/poker/cards/joker.png";const rank=card[0]==="T"?"10":card[0];return `/static/poker/cards/${suits[card[1]]}_${rank}.png`}
function cardEl(card,selectable=false){const el=document.createElement("img");el.className=card.startsWith("X")?"card joker":"card";el.src=cardPath(card);el.alt=card.startsWith("X")?"JOKER":card;if(selectable){if(selected.has(card))el.classList.add("selected");el.onclick=()=>{selected.has(card)?selected.delete(card):selected.add(card);renderHand()}}return el}
async function loadMe(){const r=await fetch(`${API}/api/casino/me?session=${session}`);if(r.ok){me=await r.json();document.getElementById("balance").textContent=`残高 ${fmt(me.balance)}`}}
async function loadRoom(){const r=await fetch(`${API}/api/casino/room-info?room_id=${roomId}`);room=await r.json();if(room.ok)document.getElementById("ratePill").textContent=fmt(room.room.rate_amount)}
async function loadState(){const r=await fetch(`${API}/api/casino/daifugo/state?room_id=${roomId}&session=${session}`);if(!r.ok)return;const data=await r.json(),wasRound=game?.round_number;game=data.game;if(wasRound!==game.round_number)selected.clear();if(game.phase==="round_result")await loadMe();render()}
function renderHand(){const hand=document.getElementById("hand"),cards=game?.my_hand||[];selected.forEach(card=>{if(!cards.includes(card))selected.delete(card)});hand.innerHTML="";cards.forEach(card=>hand.appendChild(cardEl(card,true)));document.getElementById("handCount").textContent=`(${cards.length}枚)`}
function render(){
 if(!game||!me)return;const mine=game.players.find(p=>String(p.user_id)===String(me.user_id)),current=game.players.find(p=>String(p.user_id)===String(game.current_turn_user_id));
 document.getElementById("roundPill").textContent=`ROUND ${game.round_number}`;document.getElementById("turnPill").textContent=current?`${current.user_name} の番`:"-";document.getElementById("directionPill").textContent=game.direction===1?"時計回り":"反時計回り";
 const phaseText={waiting:"参加者を待っています",playing:current?`${current.user_name} のターン`:"進行中",exchange:"カード交換",round_result:"ラウンド終了"};document.getElementById("phase").textContent=phaseText[game.phase]||game.phase;
 document.getElementById("flags").textContent=[game.revolution&&"革命中",game.jack_back&&"Jバック",game.suit_lock&&"しばり",game.number_lock!==null&&game.number_lock!==undefined&&"数しば"].filter(Boolean).join(" / ");
 const table=document.getElementById("tableCards");table.innerHTML="";(game.table_cards||[]).forEach(c=>table.appendChild(cardEl(c)));const last=game.players.find(p=>String(p.user_id)===String(game.last_player_user_id));document.getElementById("lastPlayer").textContent=last?`${last.user_name} が出しました`:"場は空です";
 renderHand();document.getElementById("waitingActions").style.display=game.phase==="waiting"?"flex":"none";document.getElementById("playActions").style.display=game.phase==="playing"?"flex":"none";document.getElementById("exchangeActions").style.display=game.phase==="exchange"&&game.exchange_required&&!game.exchange_done?"flex":"none";
 document.getElementById("readyBtn").disabled=mine?.ready;document.getElementById("startBtn").disabled=String(game.host_user_id)!==String(me.user_id)||game.players.length<3||!game.players.every(p=>p.ready);const myTurn=String(game.current_turn_user_id)===String(me.user_id);document.getElementById("playBtn").disabled=!myTurn;document.getElementById("passBtn").disabled=!myTurn;
 const note=document.getElementById("exchangeNote");note.classList.toggle("show",game.phase==="exchange");note.textContent=game.exchange_required?`${game.exchange_target}へ渡すカードを${game.exchange_required}枚選択してください`:game.phase==="exchange"?"カード交換を待っています":"";
 const cont=document.getElementById("continueBox");cont.classList.toggle("show",game.phase==="round_result");document.getElementById("voteText").textContent=`連戦希望 ${game.continue_votes.length}/${game.players.length}`;document.getElementById("continueYes").disabled=mine?.continued||game.series_finished;document.getElementById("continueNo").disabled=game.series_finished;
 const players=document.getElementById("players");players.innerHTML="";game.players.forEach(p=>{const row=document.createElement("div");row.className=`player ${String(p.user_id)===String(game.current_turn_user_id)?"turn":""} ${p.finished_rank?"done":""}`;const top=document.createElement("div");top.className="player-top";const name=document.createElement("span");name.textContent=p.user_name;const count=document.createElement("span");count.textContent=`${p.hand_count}枚`;top.append(name,count);const role=document.createElement("div");role.className="role";role.textContent=p.role+(p.foul_finished?" / 反則上がり":"")+(p.continued?" / 連戦OK":"");row.append(top,role);if(p.finished_rank){const rank=document.createElement("div");rank.className="rank";rank.textContent=`${p.finished_rank}位`;row.appendChild(rank)}players.appendChild(row)});
 const rules=document.getElementById("rules");rules.innerHTML="";Object.entries(ruleLabels).forEach(([key,label])=>{const row=document.createElement("div");row.className=`rule ${game.rules[key]?"":"off"}`;row.innerHTML=`<span>${label}</span><strong>${game.rules[key]?"ON":"OFF"}</strong>`;rules.appendChild(row)});
 if(game.cutin&&game.cutin.id!==lastCutin){lastCutin=game.cutin.id;document.getElementById("cutinTitle").textContent=game.cutin.title;document.getElementById("cutinSub").textContent=game.cutin.subtitle;const c=document.getElementById("cutin");c.classList.add("show");setTimeout(()=>c.classList.remove("show"),1800)}
}
const socket=io(API,{auth:{room_id:roomId,session,game:"daifugo"}});socket.on("connect",()=>socket.emit("join_room",{room_id:roomId,game:"daifugo"}));socket.on("daifugo:update",loadState);socket.on("casino:user_joined",async()=>{await loadRoom();await loadState()});socket.on("casino:room_deleted",()=>location.href=`/lobby?game=daifugo&session=${session}`);
function emit(event,payload={}){socket.emit(event,{room_id:roomId,session,...payload},res=>{if(res&&!res.ok)document.getElementById("message").textContent=errors[res.error]||"操作できませんでした";else{if(["daifugo_play","daifugo_exchange"].includes(event))selected.clear();document.getElementById("message").textContent=""}})}
document.getElementById("readyBtn").onclick=()=>emit("daifugo_ready");document.getElementById("startBtn").onclick=()=>emit("daifugo_start");document.getElementById("playBtn").onclick=()=>emit("daifugo_play",{cards:[...selected]});document.getElementById("passBtn").onclick=()=>emit("daifugo_pass");document.getElementById("exchangeBtn").onclick=()=>emit("daifugo_exchange",{cards:[...selected]});document.getElementById("continueYes").onclick=()=>emit("daifugo_continue",{continue_play:true});document.getElementById("continueNo").onclick=()=>emit("daifugo_continue",{continue_play:false});
document.querySelectorAll(".tab").forEach(btn=>btn.onclick=()=>{document.querySelectorAll(".tab,.tab-content").forEach(x=>x.classList.remove("active"));btn.classList.add("active");document.getElementById(btn.dataset.tab).classList.add("active")});
function sendChat(){const input=document.getElementById("chatInput"),message=input.value.trim();if(!message||!me)return;socket.emit("chat_message",{room_id:roomId,user_name:me.user_name,message,game:"daifugo"});input.value=""}document.getElementById("chatSend").onclick=sendChat;document.getElementById("chatInput").onkeydown=e=>{if(e.key==="Enter")sendChat()};socket.on("chat_message",data=>{const row=document.createElement("div");row.className="chat-message";const user=document.createElement("div");user.className="chat-user";user.textContent=data.user_name;const text=document.createElement("div");text.textContent=data.message;row.append(user,text);document.getElementById("chatBox").appendChild(row)});
async function leave(){await fetch(`${API}/api/casino/leave-room`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({room_id:roomId,session})}).catch(()=>{})}document.getElementById("backBtn").onclick=async()=>{await leave();location.href=`/lobby?game=daifugo&session=${session}`};window.addEventListener("beforeunload",()=>navigator.sendBeacon(`${API}/api/casino/leave-room`,new Blob([JSON.stringify({room_id:roomId,session})],{type:"application/json"})));
(async()=>{await loadMe();await loadRoom();await loadState()})();
</script>
</body>
</html>
